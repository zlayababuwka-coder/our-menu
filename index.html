<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriSplit — Умный Конструктор Семейного Рациона</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2240%22 stroke=%22%236366f1%22 stroke-width=%228%22 fill=%22none%22 stroke-dasharray=%22180 50%22/><circle cx=%2250%22 cy=%2250%22 r=%2225%22 stroke=%22%23ec4899%22 stroke-width=%228%22 fill=%22none%22 stroke-dasharray=%22100 40%22/></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --bg-mesh: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0, transparent 45%),
                       radial-gradient(at 50% 0%, rgba(6, 182, 212, 0.15) 0, transparent 50%),
                       radial-gradient(at 100% 0%, rgba(236, 72, 153, 0.15) 0, transparent 45%),
                       #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.6);
            --glass-input: rgba(255, 255, 255, 0.6);
            --shadow-soft: 0 10px 40px -10px rgba(15, 23, 42, 0.05);
            --shadow-hover: 0 20px 50px -12px rgba(15, 23, 42, 0.1);
            --radius-lg: 24px;
            --radius-md: 14px;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            
            --p1-main: #4f46e5;
            --p1-light: rgba(99, 102, 241, 0.1);
            --p1-gradient: linear-gradient(135deg, #4f46e5, #6366f1);
            
            --p2-main: #06b6d4;
            --p2-light: rgba(6, 182, 212, 0.1);
            --p2-gradient: linear-gradient(135deg, #06b6d4, #22d3ee);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-mesh); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; }
        
        /* ... existing styles preserved ... */
        .glass { background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--glass-border); box-shadow: var(--shadow-soft); }
        .nav-btn { background: none; border: none; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; transition: var(--transition); padding: 10px 16px; border-radius: var(--radius-md); }
        .nav-btn.active { color: #0f172a; background: rgba(255,255,255,0.8); }
        
        .recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
        
        /* Minimalist Slider Override */
        input[type=range] { -webkit-appearance: none; width: 100%; height: 2px; background: #cbd5e1; outline: none; margin: 15px 0; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #0f172a; cursor: pointer; }

        @media (min-width: 1024px) {
            body { flex-direction: row; }
            nav { width: 280px; height: 100vh; position: fixed; border-right: 1px solid var(--glass-border); padding: 40px 24px; }
            .container { margin-left: 280px; padding: 40px; }
        }

        /* Responsive Mobile Bottom Nav */
        @media (max-width: 768px) {
            nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 65px; flex-direction: row; justify-content: space-around; border-top: 1px solid var(--glass-border); background: var(--glass-bg); backdrop-filter: blur(10px); z-index: 9999; }
            .nav-btn span { display: none; }
            .nav-btn i { font-size: 1.5rem; }
            .container { padding-bottom: 80px; }
            .grid-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav class="glass">
        <button class="nav-btn active" onclick="switchTab('kbju_calc')"><i class="fa-solid fa-sliders"></i><span>КБЖУ</span></button>
        <button class="nav-btn" onclick="switchTab('cookbook')"><i class="fa-solid fa-utensils"></i><span>Рецепты</span></button>
        <button class="nav-btn" onclick="switchTab('database')"><i class="fa-solid fa-apple-whole"></i><span>База</span></button>
        <button class="nav-btn" onclick="switchTab('diary')"><i class="fa-solid fa-book"></i><span>Дневник</span></button>
        <button class="nav-btn" onclick="switchTab('progress')"><i class="fa-solid fa-chart-line"></i><span>Прогресс</span></button>
    </nav>

    <div class="container">
        <div id="tab-kbju_calc" class="tab-content active">
            <div class="card glass">
                <h2>Расчет КБЖУ</h2>
                <div class="grid-2">
                    <input type="text" id="user1-name" placeholder="Имя Пользователя 1">
                    <input type="text" id="user2-name" placeholder="Имя Пользователя 2">
                </div>
                <button class="primary" onclick="calculatePacing()">Рассчитать</button>
                
                <div id="kbju-results" class="grid-2" style="margin-top:20px; display:none;">
                    <div class="glass" style="padding:20px; border-radius:var(--radius-md);">
                        <h3 id="res-u1-name">User 1</h3>
                        <div class="pacing-btn-group">
                            <button class="pacing-btn" onclick="updatePacing('u1', 0.9)">Комфортный</button>
                            <button class="pacing-btn" onclick="updatePacing('u1', 0.85)">Умеренный</button>
                            <button class="pacing-btn" onclick="updatePacing('u1', 0.75)">Интенсивный</button>
                        </div>
                        <div id="u1-stats" style="margin-top:10px;"></div>
                    </div>
                    <div class="glass" style="padding:20px; border-radius:var(--radius-md);">
                        <h3 id="res-u2-name">User 2</h3>
                        <div class="pacing-btn-group">
                            <button class="pacing-btn" onclick="updatePacing('u2', 0.9)">Комфортный</button>
                            <button class="pacing-btn" onclick="updatePacing('u2', 0.85)">Умеренный</button>
                            <button class="pacing-btn" onclick="updatePacing('u2', 0.75)">Интенсивный</button>
                        </div>
                        <div id="u2-stats" style="margin-top:10px;"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-cookbook" class="tab-content">
             <div class="card glass" id="unified-recipe-modal" style="display:none;">
                <span class="modal-close" onclick="closeModal()">×</span>
                <div class="grid-2">
                    <div class="left-section">
                        <h4>Ингредиенты</h4>
                        <div id="ingredient-list"></div>
                        <label>Вес готового блюда (грамм)</label>
                        <input type="number" id="cooked-weight" placeholder="0">
                    </div>
                    <div class="right-section">
                        <h4>Разделение порций</h4>
                        <input type="range" class="range-slider" min="1" max="10" step="1">
                        <button class="primary" style="width:100%;">Собрать список 🛒</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-database" class="tab-content">
            <div class="filters-panel">
                <button class="secondary" onclick="filterFood('Все')">Все</button>
                <button class="secondary" onclick="filterFood('Крупы')">Крупы/Бобовые</button>
                <button class="secondary" onclick="filterFood('Мясо')">Мясо/Рыба</button>
            </div>
            <div id="food-list"></div>
        </div>

        <div id="tab-diary" class="tab-content">
            <div class="filters-panel">
                <button class="secondary" onclick="loadDiary('today')">Сегодня</button>
                <button class="secondary" onclick="loadDiary('week')">Неделя</button>
                <button class="secondary" onclick="loadDiary('month')">Месяц</button>
            </div>
            <div id="diary-logs"></div>
        </div>

        <div id="tab-progress" class="tab-content">
            <div class="grid-2">
                <div class="card glass">
                    <button onclick="updateChart('u1', '7d')">7 дней</button>
                    <canvas id="chart-u1"></canvas>
                </div>
                <div class="card glass">
                    <button onclick="updateChart('u2', '7d')">7 дней</button>
                    <canvas id="chart-u2"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- State Management ---
        let state = { recipes: [], logs: [], profiles: { u1: {name: "User 1"}, u2: {name: "User 2"} } };

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.getElementById('tab-' + tabId).style.display = 'block';
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-tab-' + tabId)?.classList.add('active');
        }

        // --- Logic for Tabs ---
        function calculatePacing() {
            document.getElementById('kbju-results').style.display = 'grid';
            document.getElementById('res-u1-name').innerText = document.getElementById('user1-name').value;
            document.getElementById('res-u2-name').innerText = document.getElementById('user2-name').value;
        }

        function updatePacing(user, multiplier) {
            // Logic to calculate target based on multiplier
            const statsDiv = document.getElementById(`${user}-stats`);
            statsDiv.innerHTML = `<p>Цель: ${Math.round(2000 * multiplier)} ккал</p>`;
        }

        function filterFood(cat) {
            const rows = document.querySelectorAll('.food-row');
            rows.forEach(r => {
                if(cat === 'Все' || r.dataset.category === cat) r.style.display = 'block';
                else r.style.display = 'none';
            });
        }

        function loadDiary(range) {
            console.log("Loading stats for: " + range);
            // Logic to parse logs and render averages
        }

        function updateChart(user, period) {
            // Re-render chart for specific user
            console.log(`Updating chart for ${user} with period ${period}`);
        }

        function closeModal() {
            document.getElementById('unified-recipe-modal').style.display = 'none';
        }

    </script>
</body>
</html>
